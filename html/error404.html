<!doctype html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница 404</title>
  <style>
  body {
    font-family: "Montserrat", sans-serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: normal;
}
 
#main {
    height: 100vh;
    background-image: url("back.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-blend-mode: overlay;
    background-color: rgba(0, 0, 0, 0.75);
}
 
.content {
    color: #fff;
    height: inherit;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    user-select: none;
}
 
.content h1 {
    font-size: 10rem;
    font-weight: 800;
    line-height: 8rem;
    margin: 0 0 1rem;
    opacity: .5;
}
 
.content span   {
    font-size: 2rem;
    font-weight: 600;
    margin: 0 0 1rem;
}
 
.content p {
    text-align: center;
    margin: 0 0 2rem;
}
 
.content a {
    color: #fff;
    line-height: 3rem;
    text-decoration: none;
    padding: 0 2rem;
    border: 1px solid;
    border-radius: 1.5rem;
    display: block;
    position: relative;
    z-index: 1;
    transition: all .5s ease;
}
 
.content a:hover {
    color: #000;
    background: #fff;
}
 
.content + canvas {
    position: absolute;
    top: 0;
  </style>
</head>
 
<body>
 
  <div id="main">
    <div class="content">
      <h1>404</h1>
      <span>Oops!</span>
      <p>
        Кажется, Вы ошиблись адресом. <br> 
        Такой страницы не существует, но, возможно, она появится в будущем.
      </p>
      <a href="#">Домой</a>
    </div>
  </div>
</body>
</html>
